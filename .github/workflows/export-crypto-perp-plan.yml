name: Export Crypto Perp Plan

on:
  pull_request:
    paths:
      - "docs/strategy_research_lab/15_CRYPTO_PERP_PERSONAL_EDGE_LAB_IMPLEMENTATION_PLAN_2026-06-20.md"
      - "docs/strategy_research_lab/README.md"
      - ".github/workflows/export-crypto-perp-plan.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build handoff directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p handoff/docs/strategy_research_lab
          cp docs/strategy_research_lab/15_CRYPTO_PERP_PERSONAL_EDGE_LAB_IMPLEMENTATION_PLAN_2026-06-20.md handoff/docs/strategy_research_lab/
          cp docs/strategy_research_lab/README.md handoff/docs/strategy_research_lab/
          cat > handoff/00_READ_ME_FIRST.md <<EOF
          # MarketLens Strike Crypto Perp Personal Edge Lab Handoff

          Source repository: https://github.com/tsutomu-n/marketlens-strike
          Source branch: ${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}
          Source commit: ${GITHUB_SHA}
          Draft pull request: https://github.com/tsutomu-n/marketlens-strike/pull/2

          Start with:

          1. docs/strategy_research_lab/15_CRYPTO_PERP_PERSONAL_EDGE_LAB_IMPLEMENTATION_PLAN_2026-06-20.md
          2. docs/strategy_research_lab/README.md

          This package is an implementation plan only. It does not contain credentials, wallet material, exchange writes, or live-order permission.
          EOF
          cat > handoff/MANIFEST.txt <<EOF
          package=marketlens-strike-crypto-perp-personal-edge-plan-2026-06-20
          source_commit=${GITHUB_SHA}
          generated_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          sha256sum handoff/00_READ_ME_FIRST.md \
            handoff/docs/strategy_research_lab/15_CRYPTO_PERP_PERSONAL_EDGE_LAB_IMPLEMENTATION_PLAN_2026-06-20.md \
            handoff/docs/strategy_research_lab/README.md \
            >> handoff/MANIFEST.txt
      - name: Upload handoff ZIP
        uses: actions/upload-artifact@v4
        with:
          name: marketlens-strike-crypto-perp-personal-edge-plan-2026-06-20
          path: handoff/
          if-no-files-found: error
          retention-days: 7
