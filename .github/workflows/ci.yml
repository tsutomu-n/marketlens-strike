name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: oven-sh/setup-bun@v1
      - name: Set up Python
        run: uv python install 3.14
      - name: Check
        run: ./scripts/check
