schema_version: strategy_authoring_spec.v1
experiment:
  strategy_id: pair_hedge_notional_user_v1
  strategy_family: pair_hedge
  strategy_version: v1
  description: Dynamic notional-aware pair hedge example for Strategy Lab paper research.
  symbol_bindings:
    - execution_venue: trade_xyz
      execution_symbol: AAA100
      real_market_symbol: AAA
      asset_class: equity
      country: US
      currency: USD
    - execution_venue: trade_xyz
      execution_symbol: BBB100
      real_market_symbol: BBB
      asset_class: equity
      country: US
      currency: USD
  run_profile_id: strategy_lab_research_only
data:
  feature_panel_path: data/research/feature_panel.parquet
  quote_data_path: data/normalized/quotes.parquet
  cost_model_path: data/research/venue_cost_matrix.csv
rules:
  side: long
  timeframe: 4h
  derived_features:
    - name: rolling_corr
      op: rolling_corr
      columns: [asset_return, hedge_return]
      window: 20
    - name: rolling_beta
      op: rolling_beta
      columns: [asset_return, hedge_return]
      window: 20
    - name: pair_spread_z
      op: rolling_spread_zscore
      columns: [asset_return, hedge_return]
      window: 20
    - name: hedge_information_ratio
      op: information_ratio
      columns: [asset_return, hedge_return]
      window: 20
  entry:
    all:
      - column: trade_allowed
        op: is_true
      - column: rolling_corr
        op: gt
        value: 0.6
      - column: pair_spread_z
        op: gt
        value: 1.25
      - column: hedge_information_ratio
        op: gt
        value: 0
  hold:
    any:
      - column: liquidity_stress
        op: gt
        value: 0.8
      - column: pair_spread_z
        op: lt
        value: 0.25
  exit:
    stop_loss_bps: 180
    take_profit_bps: 320
    trailing_stop_bps: 140
    partial_take_profit_bps: 220
    partial_exit_fraction: 0.5
  execution:
    slippage_bps: 5
    max_fill_fraction: 0.9
    max_spread_bps: 80
  multi_leg:
    enabled: true
    anchor_real_market_symbol: AAA
    legs:
      - real_market_symbol: AAA
        side: same
        position_weight: 1.0
        notional_usd: 1000
        reason_code: lead_long_leg
      - real_market_symbol: BBB
        side: opposite
        position_weight: 0.5
        position_weight_column: hedge_ratio
        notional_usd_column: hedge_notional_usd
        stop_loss_bps_column: hedge_stop_bps
        take_profit_bps_column: hedge_take_bps
        partial_exit_fraction_column: hedge_partial_fraction
        slippage_bps_column: hedge_slippage_bps
        max_fill_fraction: 0.5
        min_fill_fraction_column: hedge_min_fill
        max_spread_bps_column: hedge_spread_cap
        max_latency_ms: 50
        latency_column: hedge_latency_ms
        min_queue_position_score_column: hedge_queue_required
        queue_position_score_column: hedge_queue_score
        reason_code: dynamic_hedge_leg
  sizing:
    position_weight: 1.0
    notional_usd: 1000
  score:
    weighted_sum:
      - column: pair_spread_z
        weight: 10
      - column: hedge_information_ratio
        weight: 5
      - column: rolling_corr
        weight: 2
  confidence: 0.7
  reason_code: pair_hedge_notional_v1
  hold_reason_code: pair_hedge_hold_v1
backtest:
  split_method: purged_walk_forward
  era_unit: trading_day
  label_horizon_minutes: 240
  purge_minutes: 0
  embargo_minutes: 0
  min_trade_count: 1
  primary_metric: multi_leg_group_metrics.notional_weighted_total_return
  pass_thresholds:
    multi_leg_group_metrics.complete_group_count: 1
    multi_leg_group_metrics.incomplete_group_count: 0
    multi_leg_group_metrics.notional_weighted_total_return: 0
    multi_leg_group_metrics.avg_leg_return_imbalance: 0.1
optimizer:
  selection_metric: multi_leg_group_metrics.notional_weighted_total_return
  selection_direction: auto
  max_variants: 4
  parameter_sweep:
    rules.sizing.position_weight: [0.5, 1.0]
promotion:
  default_decision: hold
  allow_paper_preview: true
