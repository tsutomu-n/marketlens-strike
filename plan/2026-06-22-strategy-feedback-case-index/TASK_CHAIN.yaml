version: 1
name: strategy_feedback_and_case_index
created_at_jst: "2026-06-22_17:55"
updated_at_jst: "2026-06-22_18:16"
objective: >-
  Implement local/offline Strategy Input Feedback proposal/review artifacts,
  Strategy Case Lite Index artifacts, and Static Workbench Viewer support,
  without adding paper/live/network/venue-write permission.
global_constraints:
  - Code, tests, schemas, config, CLI help, and current docs are authoritative.
  - Do not add network calls, credentials, wallet, signing, exchange write, live order, DB registry, or server UI.
  - Do not directly edit Strategy Input Contract from generated feedback.
  - Keep artifacts local, reproducible, and source-hashed.
  - Validate source artifacts with existing schema/model contracts; do not infer from file names alone.
  - Preserve existing Typer command, schema, and docs patterns.
tasks:
  - id: T0
    title: Pre-implementation current truth check
    goal: Confirm clean current repo and existing CLI surfaces before implementation.
    depends_on: []
    target_files: []
    out_of_scope:
      - Editing files.
      - Running network or venue checks.
    acceptance:
      - Current branch and dirty state are known.
      - Existing strategy input, runtime observation, strategy-learning-ledger-update, case-lite, and viewer CLIs are confirmed from CLI help.
    verification:
      - git status --short --branch
      - git log -1 --oneline --decorate
      - uv run sis --help
      - uv run python scripts/check_current_docs.py
    destructive_level: none
  - id: T1
    title: Strategy Input Feedback schemas and models
    goal: Add proposal and human review artifact schemas/models for Strategy Input Contract update candidates.
    depends_on:
      - T0
    target_files:
      - src/sis/strategy_input_feedback/__init__.py
      - src/sis/strategy_input_feedback/models.py
      - schemas/strategy_input_contract_update_proposal.v1.schema.json
      - schemas/strategy_input_contract_update_review.v1.schema.json
      - tests/strategy_input_feedback/test_strategy_input_feedback_schema.py
    out_of_scope:
      - CLI implementation.
      - Direct Strategy Input Contract writing.
      - Live or paper permission.
    acceptance:
      - Valid proposal and review fixtures pass schema/model validation.
      - Boundary flags cannot be true.
      - Unknown schema version fails.
      - Source artifact path, sha256, schema_version, and artifact_kind are required.
      - Proposal status distinguishes ready-for-human-review from missing source-contract context.
      - Review approved_change_ids must reference proposal change_id values.
    verification:
      - uv run pytest tests/strategy_input_feedback/test_strategy_input_feedback_schema.py
    destructive_level: low
  - id: T2
    title: Strategy Input Feedback service and CLI
    goal: Generate update proposal and review artifacts from runtime observation and learning event artifacts.
    depends_on:
      - T1
    target_files:
      - src/sis/strategy_input_feedback/service.py
      - src/sis/strategy_input_feedback/rendering.py
      - src/sis/commands/strategy_input_feedback.py
      - src/sis/cli.py
      - tests/strategy_input_feedback/test_strategy_input_feedback.py
      - tests/strategy_input_feedback/test_strategy_input_feedback_cli.py
    out_of_scope:
      - Auto-apply.
      - Contract file patching.
      - External services or model calls.
    acceptance:
      - Runtime Observation-only input can build a proposal.
      - Learning Event-only input can build a proposal.
      - Empty source inputs fail.
      - Mixed source inputs preserve all path/hash/schema provenance.
      - Missing --source-contract does not produce an apply-ready proposal.
      - Review command creates a decision artifact and never permits direct apply.
      - Review command rejects approved_change_ids that are not present in the proposal.
      - New commands appear in uv run sis --help.
    verification:
      - uv run pytest tests/strategy_input_feedback
      - uv run sis --help
    destructive_level: low
  - id: T3
    title: Strategy Case Index schemas and models
    goal: Define a read-only index artifact over multiple strategy_case_lite.v1 artifacts.
    depends_on:
      - T0
    target_files:
      - src/sis/strategy_case_index/__init__.py
      - src/sis/strategy_case_index/models.py
      - schemas/strategy_case_index.v1.schema.json
      - tests/strategy_case_index/test_strategy_case_index_schema.py
    out_of_scope:
      - Database registry.
      - Merge conflict policy.
      - UI timeline editor.
    acceptance:
      - Valid index fixture passes schema/model validation.
      - case_count and strategy_count mismatches fail.
      - Boundary flags cannot be true.
      - Latest case selection is deterministic.
    verification:
      - uv run pytest tests/strategy_case_index/test_strategy_case_index_schema.py
    destructive_level: low
  - id: T4
    title: Strategy Case Index service and CLI
    goal: Build a reproducible case index from explicit case paths and/or a data directory.
    depends_on:
      - T3
    target_files:
      - src/sis/strategy_case_index/service.py
      - src/sis/strategy_case_index/rendering.py
      - src/sis/commands/strategy_case_index.py
      - src/sis/cli.py
      - tests/strategy_case_index/test_strategy_case_index.py
      - tests/strategy_case_index/test_strategy_case_index_cli.py
    out_of_scope:
      - Mutating source case artifacts.
      - Persistent registry storage.
      - Network or live checks.
    acceptance:
      - Two explicit case artifacts generate one index.
      - data-dir discovery finds case-lite artifacts.
      - Duplicate artifact paths/hashes are not double-counted.
      - Missing or malformed source artifacts fail clearly.
      - data-dir discovery ignores unrelated JSON and fails when no strategy_case_lite.v1 JSON is found.
      - New command appears in uv run sis --help.
    verification:
      - uv run pytest tests/strategy_case_index
      - uv run sis --help
    destructive_level: low
  - id: T5
    title: Workbench Viewer case index support
    goal: Render strategy_case_index.v1 summaries in the existing static viewer.
    depends_on:
      - T4
    target_files:
      - src/sis/strategy_workbench_viewer/models.py
      - src/sis/strategy_workbench_viewer/service.py
      - src/sis/strategy_workbench_viewer/rendering.py
      - schemas/strategy_workbench_viewer.v1.schema.json
      - tests/strategy_workbench_viewer/test_strategy_workbench_viewer.py
    out_of_scope:
      - Svelte UI.
      - Server UI.
      - Viewer-side artifact mutation.
    acceptance:
      - Explicit case index artifact is summarized in viewer output.
      - data-dir scan can include case index artifact.
      - HTML includes case count, strategy count, latest status, open actions, blocked reasons, and source hash.
      - Permission true flags in case index sources are boundary violations, not displayed as permission.
      - Existing viewer artifact summaries still pass tests.
    verification:
      - uv run pytest tests/strategy_workbench_viewer/test_strategy_workbench_viewer.py
    destructive_level: low
  - id: T6
    title: Current docs and CLI catalog
    goal: Make new surfaces discoverable without overstating readiness.
    depends_on:
      - T2
      - T5
    target_files:
      - docs/strategy_input_feedback/README.md
      - docs/strategy_case_index/README.md
      - docs/strategy_workbench_viewer/README.md
      - docs/IMPLEMENTED_SURFACES.md
      - docs/NEXT_DIRECTION_CURRENT.md
      - docs/REPO_CLI_CATALOG_CURRENT_2026-06-17.md
      - scripts/check_current_docs.py
    out_of_scope:
      - Editing archived historical plans.
      - Claiming paper/live/venue readiness.
    acceptance:
      - Current docs link to new docs.
      - CLI catalog includes new commands.
      - NEXT_DIRECTION_CURRENT keeps paper bridge, network probes, demo order lifecycle, and production schema widening as separate/unimplemented scopes.
    verification:
      - uv run python scripts/check_current_docs.py
      - uv run python scripts/check_cli_catalog.py
    destructive_level: low
  - id: T7
    title: Final verification
    goal: Verify implementation, docs, schema, CLI catalog, type checks, and tests together.
    depends_on:
      - T6
    target_files: []
    out_of_scope:
      - Any new implementation after full check unless needed to fix a failing verification.
    acceptance:
      - Focused tests pass.
      - Full scripts/check passes.
      - Final report includes generated sample artifact paths.
      - Final report states no live/network/wallet/signing/exchange-write work was done.
    verification:
      - uv run pytest tests/strategy_input_feedback tests/strategy_case_index tests/strategy_workbench_viewer
      - ./scripts/check
    destructive_level: none
