schema_version: cost_model.crypto_perp.bitget_usdt_futures.v1
created_at: 2026-07-05T09:55:00Z
updated_at: 2026-07-06T03:22:00Z
status: documented_reference_with_code_constants

purpose: >-
  Single reference point for Crypto Perp Bitget USDT-FUTURES cost assumptions.
  Normal runtime defaults for the targeted local simulation surfaces are wired
  through src/sis/crypto_perp/cost_model.py. This config documents the same
  assumptions and separates normal project assumptions from explicit stress or
  conservative assumptions.

product:
  exchange: bitget
  product_type: USDT-FUTURES
  instrument_type: perpetual_future
  quote_currency: USDT

project_assumption:
  cost_model_id: crypto_perp_project_cost_assumption_v1
  taker_fee_rate: "0.0004"
  taker_fee_bps: "4"
  round_trip_taker_fee_rate: "0.0008"
  round_trip_taker_fee_bps: "8"
  funding_rate_assumption: "0.0001"
  default_slippage_bps: "2"
  stress_slippage_multiplier: "2"
  source: project_cost_assumption
  wired_surfaces:
    - crypto-perp-backtest-candidate-pack
    - crypto-perp-tournament-rows-v2
    - build_crypto_perp_backtest_candidate_pack
    - build_cost_aware_tournament_rows
    - build_pre_actual_cash_evidence_pack
    - write_pre_actual_cash_evidence_pack

stress_or_conservative_assumption:
  cost_model_id: crypto_perp_conservative_stress_assumption_v1
  taker_fee_rate: "0.0006"
  taker_fee_bps: "6"
  round_trip_taker_fee_rate: "0.0012"
  round_trip_taker_fee_bps: "12"
  interpretation: explicit_conservative_or_stress_assumption_not_normal_default
  use_only_when_named: true
  actual_cash_used: false
  measured_exchange_cost: false

zero_cost_policy:
  fee_rate_must_be_positive: true
  slippage_bps_must_be_positive: true
  zero_cost_simulation_allowed: false

slippage:
  default_slippage_bps: "2"
  stress_slippage_multiplier: "2"
  measured_slippage_available: false
  orderbook_depth_available: false
  known_gaps:
    - ORDERBOOK_DEPTH_NOT_FETCHED
    - MEASURED_SLIPPAGE_NOT_FETCHED
    - WEBSOCKET_NOT_FETCHED

funding:
  default_funding_rate_assumption: "0.0001"
  funding_interval_hours: 8
  source_quality: estimate_or_snapshot_only
  known_gaps:
    - FUNDING_IS_NOT_ACTUAL_CASH
    - FUNDING_INTERVAL_AND_REALIZED_FUNDING_NOT_FULLY_RECONCILED

boundary:
  actual_cash_used: false
  profit_proven: false
  paper_permission: false
  tiny_live_permission: false
  live_order_permission: false
  wallet_or_signing_used: false
  exchange_write_used: false

operator_rules:
  - Do not call estimate rows actual cash.
  - Do not zero-fill missing books, trades, replay, cash ledger, or live measurement.
  - Do not treat conservative or stress assumptions as measured exchange cost.
  - Treat 0.04 percent taker fee, 0.0001 funding, and 2 bps slippage as the normal project assumption for targeted local simulation surfaces.
