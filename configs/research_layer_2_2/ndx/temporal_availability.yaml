schema_version: research_temporal_availability.v1

layers:
  t_prev_close:
    - qqq_prev_close
    - spy_prev_close
    - smh_prev_close

  t_pre_open:
    - dgs10_delta
    - vix_level
    - vix_change

  t_open_observed:
    - qqq_open_gap
    - spy_gap
    - smh_gap
    - mega_cap_basket_gap

  t_open_plus_buffer:
    - expected_ndx_move
    - open_gap_residual

  t_after_close:
    - qqq_open_to_close_return

  provider_dependent:
    - nq_overnight_move_optional
    - qqq_premium_discount_optional

forbidden_layer_edges:
  - from: t_after_close
    to: t_open_plus_buffer
    reason: future_to_signal_leakage
  - from: t_after_close
    to: t_open_observed
    reason: future_to_signal_leakage
